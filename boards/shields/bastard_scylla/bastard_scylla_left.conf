# Energiebeheer: Zet de helften in diepe slaap na 15 minuten inactiviteit
#CONFIG_ZMK_SLEEP=y
#CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Verbeter de Bluetooth verbindingssterkte (helpt bij verbinding met dongle)
#CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Schakel USB uit op de helften om stroom te besparen
# (Ze communiceren immers alleen via Bluetooth met de dongle)
#CONFIG_ZMK_USB=n

# Zorg dat Studio NIET op de helften draait (bespaart geheugen en stroom)
# Alleen de dongle handelt Studio af.
#CONFIG_ZMK_STUDIO=n


# --- NAAM VAN HET TOETSENBORD ---
CONFIG_ZMK_KEYBOARD_NAME="Scylla"

# --- ROL VAN DEZE HELFT (Central / Baas) ---
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1

# --- USB & ZMK STUDIO ---
CONFIG_ZMK_USB=y
CONFIG_ZMK_STUDIO=y

# --- BATTERIJ WEERGAVE ---
# Haalt het batterijniveau van de rechterhelft op en stuurt dit door naar de PC
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# --- BLUETOOTH OPTIMALISATIE (Optioneel maar aanbevolen) ---
# Verhoogt het zendvermogen voor een betere verbinding met de rechterhelft
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y