# Maak van de dongle de centrale hub
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# Zoek naar exact 2 helften (links en rechts)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Activeer ZMK Studio op de dongle
CONFIG_ZMK_STUDIO=y

# Zorg dat de USB verbinding voor Studio stabiel is
CONFIG_ZMK_USB=y
CONFIG_USB_DEVICE_VID=0x1D50
CONFIG_USB_DEVICE_PID=0x615E

# Energiebeheer (optioneel, maar dongle mag altijd aan blijven)
#CONFIG_ZMK_IDLE_TIMEOUT=30000