# 1. ROLLEN EN VERBINDINGEN
# Maak van de dongle de centrale hub
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
# Zoek naar exact 2 peripherals (linker- en rechterhelft)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# 2. ZMK STUDIO (Live keymap aanpassen)
CONFIG_ZMK_STUDIO=y
# Zorg dat Studio via USB werkt
CONFIG_ZMK_USB=y

# 3. USB IDENTIFICATIE (Nodig voor herkenning door ZMK Studio website)
CONFIG_USB_DEVICE_VID=0x1D50
CONFIG_USB_DEVICE_PID=0x615E
# De naam die je in Windows/macOS ziet
CONFIG_ZMK_KEYBOARD_NAME="Scylla Dongle"

# 4. BLUETOOTH OPTIMALISATIE
# Verhoog het zendvermogen voor een stabielere link met de helften
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Voorkom dat de dongle in slaap valt (hij hangt toch aan USB)
CONFIG_ZMK_IDLE_TIMEOUT=60000
CONFIG_ZMK_SLEEP=n

# 5. BATTERIJ RAPPORTAGE
# Zorg dat de dongle de batterijstatus van de helften doorgeeft aan de PC
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y