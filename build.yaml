include:
  # 1. De Dongle (PC-kant)
  - board: nice_nano_v2
    shield: bastard_scylla_dongle
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y

  # 2. De Linkerkant (Peripheral)
  - board: nice_nano_v2
    shield: bastard_scylla_left

  # 3. De Rechterkant (Peripheral)
  - board: nice_nano_v2
    shield: bastard_scylla_right

  # 4. Settings Reset (Voor Bluetooth problemen)
  - board: nice_nano_v2
    shield: settings_reset